stability.api.base-url=https://api.stability.ai
stability.api.key=${STABILITY_API_KEY:}
# Default text-to-image engine; can be overridden via env or IDE run config.
stability.api.text-engine=${STABILITY_TEXT_ENGINE:stable-diffusion-xl-1024-v1-0}
# Default image-to-image engine; kept separate for flexibility.
stability.api.image-engine=${STABILITY_IMAGE_ENGINE:stable-diffusion-xl-1024-v1-0}
# Increased multipart limits so photo uploads do not fail with HTTP 413 in PhotoToArt flow.
spring.servlet.multipart.max-file-size=20MB
# Keep request limit aligned with file limit for single-image plus prompt multipart requests.
spring.servlet.multipart.max-request-size=20MB
